<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PIGG</title>
    <link rel="stylesheet" href="../assets/style.css">
  </head>
  <body>
    <header class="topbar">
      <a class="topbar-link" href="../">All documents</a>
    </header>
    <main class="page viewer-page">
      <p class="eyebrow">CSE403 Deep Learning</p>
      <h1>PIGG</h1>
      <p class="lead">Personalized Interactive GUI Grounding proposal and final presentation.</p>
      <div class="actions">
        <button class="button preview-button active" type="button" data-pdf="final_presentation.pdf" data-title="PIGG final presentation">Presentation</button>
        <button class="button secondary preview-button" type="button" data-pdf="proposal.pdf" data-title="PIGG proposal">Proposal</button>
        <a class="button secondary github-code" href="https://github.com/hoonably/cse-archive/tree/main/CSE403-deep-learning/PIGG">GitHub Code</a>
      </div>
      <iframe class="pdf-viewer" id="pdf-viewer" src="final_presentation.pdf" title="PIGG final presentation"></iframe>
    </main>
    <script>
      const viewer = document.querySelector("#pdf-viewer");
      const buttons = document.querySelectorAll(".preview-button");

      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          viewer.src = button.dataset.pdf;
          viewer.title = button.dataset.title;

          buttons.forEach((item) => {
            item.classList.toggle("active", item === button);
            item.classList.toggle("secondary", item !== button);
          });
        });
      });
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CosmicMiner Robotics</title>
    <link rel="stylesheet" href="../assets/style.css">
  </head>
  <body>
    <header class="topbar">
      <a class="topbar-link" href="../">All documents</a>
    </header>
    <main class="page viewer-page">
      <p class="eyebrow">CSE469 Introduction to Robotics</p>
      <h1>CosmicMiner Robotics</h1>
      <p class="lead">Three progressive robotics projects on control, navigation, and multi-agent exploration.</p>
      <div class="actions">
        <button class="button preview-button active" type="button" data-pdf="project1.pdf" data-title="CosmicMiner Robotics project 1 report">Project 1</button>
        <button class="button secondary preview-button" type="button" data-pdf="project2.pdf" data-title="CosmicMiner Robotics project 2 report">Project 2</button>
        <button class="button secondary preview-button" type="button" data-pdf="project3.pdf" data-title="CosmicMiner Robotics project 3 report">Project 3</button>
        <a class="button secondary github-code" href="https://github.com/hoonably/cse-archive/tree/main/CSE469-robotics/cosmic-miner">GitHub Code</a>
      </div>
      <iframe class="pdf-viewer" id="pdf-viewer" src="project1.pdf" title="CosmicMiner Robotics project 1 report"></iframe>
    </main>
    <script>
      const viewer = document.querySelector("#pdf-viewer");
      const buttons = document.querySelectorAll(".preview-button");

      buttons.forEach((button) => {
        button.addEventListener("click", () => {
          viewer.src = button.dataset.pdf;
          viewer.title = button.dataset.title;

          buttons.forEach((item) => {
            item.classList.toggle("active", item === button);
            item.classList.toggle("secondary", item !== button);
          });
        });
      });
    </script>
  </body>
</html>
